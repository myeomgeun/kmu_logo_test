<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottie 기본 예제</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.9.6/lottie.min.js"></script>
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.8.11/dist/dotlottie-wc.js" type="module"></script>
    <style>
        html, body{width: 100%; height: 100%; margin: 0; padding: 0;}
        .wrap{background: #004F9F; text-align: center; vertical-align: middle; height: 100%; width: 100%; display: flex; justify-content: center; align-items: center; }
        #lottie-container {width: 150px; height: 150px;}
    </style>
</head>
<body>
    <div class="wrap">
        <div id="lottie-container"></div>
    </div>

    <script>
        const animation = lottie.loadAnimation({
            container: document.getElementById('lottie-container'), // 애니메이션을 삽입할 요소
            renderer: 'svg',  // 'svg', 'canvas', 'html' 중 선택 가능
            loop: true,       // 반복 재생 여부
            autoplay: true,   // 자동 재생 여부
            path: './logo.json/' // JSON 파일 경로
        });
    </script>

</body>
</html>
